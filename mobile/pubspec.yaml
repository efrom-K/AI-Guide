name: ai_audio_guide
description: AI Audio Guide — real-time autonomous walking tour client.
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.1
  geolocator: ^13.0.1
  flutter_tts: ^4.2.0       # on-device TTS — the guide speaks the narration aloud

  # Reserved for later stages (compass, mic):
  # flutter_compass: ^0.8.0   # unmaintained — breaks AGP 8 build; heading comes from GPS course instead
  # record: ^5.1.2            # mic capture for voice barge-in (next stage)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

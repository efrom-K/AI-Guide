name: ai_audio_guide
description: AI Audio Guide — real-time autonomous walking tour client.
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:    # localized Material/Cupertino widgets + gen-l10n runtime
    sdk: flutter
  intl: ^0.20.2             # ICU message formatting for the generated AppLocalizations
  web_socket_channel: ^3.0.1
  geolocator: ^13.0.1
  flutter_tts: ^4.2.0       # on-device TTS — the guide speaks the narration aloud
  record: ^7.0.0            # mic capture for voice barge-in (7.x: internally consistent federated set)
  path_provider: ^2.1.4     # temp dir for the recorded clip
  flutter_map: ^8.0.0       # open-source map (Leaflet-like, pure Dart, no API key)
  latlong2: ^0.9.1          # LatLng type for flutter_map
  sensors_plus: ^6.0.1      # magnetometer+accelerometer -> device facing (gaze_confidence=high)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true            # run gen-l10n from lib/l10n/*.arb on build
